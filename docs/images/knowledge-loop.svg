<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 200">
  <defs>
    <marker id="kl-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Outer container -->
  <rect width="780" height="200" rx="16" fill="white" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Title -->
  <text x="390" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="2">KNOWLEDGE COMPOUNDING LOOP</text>

  <!-- Card 1: Solve -->
  <g transform="translate(40, 60)">
    <rect width="140" height="80" rx="10" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <circle cx="70" cy="28" r="14" fill="#059669"/>
    <text x="70" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">1</text>
    <text x="70" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#065F46">Solve</text>
    <text x="70" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">fix the problem</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="190" y1="100" x2="220" y2="100" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#kl-arr)"/>

  <!-- Card 2: Compound -->
  <g transform="translate(230, 60)">
    <rect width="140" height="80" rx="10" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
    <circle cx="70" cy="28" r="14" fill="#D97706"/>
    <text x="70" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">2</text>
    <text x="70" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400E">Compound</text>
    <text x="70" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">ops/solutions/</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="380" y1="100" x2="410" y2="100" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#kl-arr)"/>

  <!-- Card 3: Search -->
  <g transform="translate(420, 60)">
    <rect width="140" height="80" rx="10" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1"/>
    <circle cx="70" cy="28" r="14" fill="#7C3AED"/>
    <text x="70" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">3</text>
    <text x="70" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#5B21B6">Search</text>
    <text x="70" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">learnings agent</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="570" y1="100" x2="600" y2="100" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#kl-arr)"/>

  <!-- Card 4: Plan -->
  <g transform="translate(610, 60)">
    <rect width="130" height="80" rx="10" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
    <circle cx="65" cy="28" r="14" fill="#2563EB"/>
    <text x="65" y="33" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="white">4</text>
    <text x="65" y="56" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E40AF">Plan</text>
    <text x="65" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">informed by past</text>
  </g>

  <!-- Dashed loop back -->
  <path d="M 740,140 Q 756,140 756,162 Q 756,180 390,180 Q 24,180 24,162 Q 24,140 40,140" fill="none" stroke="#C4B5FD" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="38,136 40,144 43,136" fill="#C4B5FD"/>

  <rect x="350" y="170" width="85" height="22" rx="11" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="392" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9CA3AF" font-style="italic">next sprint</text>
</svg>