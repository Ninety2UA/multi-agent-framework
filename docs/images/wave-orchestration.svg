  <g transform="translate(310, 529)">
    <rect width="185" height="32" rx="16" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.5"/>
    <circle cx="22" cy="16" r="10" fill="#059669"/>
    <text x="24" y="21" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">&#x2713;</text>
