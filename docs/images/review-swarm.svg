    <line x1="230" y1="205" x2="530" y2="265"/>
    <line x1="378" y1="205" x2="530" y2="265"/>
    <line x1="530" y1="205" x2="530" y2="265"/>
    <line x1="678" y1="205" x2="530" y2="265"/>
    <line x1="828" y1="205" x2="530" y2="265"/>
    <line x1="978" y1="205" x2="530" y2="265"/>
