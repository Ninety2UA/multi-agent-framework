    <rect width="135" height="105" rx="8" fill="#FFE4B5" stroke="#e6cfa0" stroke-width="1"/>
    <text x="67" y="22" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#7a5c1f">architecture</text>
    <line x1="10" y1="32" x2="125" y2="32" stroke="#e6cfa0" stroke-width="0.5"/>
    <text x="67" y="50" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#4a5568">SOLID</text>
    <text x="67" y="66" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#4a5568">Coupling</text>
    <text x="67" y="82" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#4a5568">Cohesion</text>
    <text x="67" y="98" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#4a5568">Boundaries</text>
