    <line x1="530" y1="58" x2="230"  y2="100"/>
    <line x1="530" y1="58" x2="378"  y2="100"/>
    <line x1="530" y1="58" x2="530"  y2="100"/>
    <line x1="530" y1="58" x2="678"  y2="100"/>
    <line x1="530" y1="58" x2="828"  y2="100"/>
    <line x1="530" y1="58" x2="978"  y2="100"/>
  </g>

  <!-- Gemini -->
  <g transform="translate(15, 100)">
