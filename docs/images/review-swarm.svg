    <text x="67" y="22" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#2d5a30">Gemini CLI</text>
    <line x1="10" y1="32" x2="125" y2="32" stroke="#9bc49d" stroke-width="0.5"/>
    <text x="67" y="50" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#4a5568">Architecture</text>
    <text x="67" y="66" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#4a5568">Design</text>
    <text x="67" y="82" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#4a5568">Readability</text>
    <text x="67" y="98" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#4a5568">Documentation</text>
  </g>

  <!-- Codex -->
  <g transform="translate(163, 100)">
    <rect width="135" height="105" rx="8" fill="#D4A574" stroke="#c49464" stroke-width="1"/>
    <text x="67" y="22" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#5c3a0a">Codex CLI</text>
