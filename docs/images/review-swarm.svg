    <rect width="135" height="105" rx="8" fill="#FFB3B3" stroke="#e6a0a0" stroke-width="1"/>
    <text x="67" y="22" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="700" fill="#8b2525">security-sentinel</text>
