  <text x="530" y="43" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="700" fill="white">Code Under Review</text>

  <!-- Lines from code to reviewers -->
  <g stroke="#d1d5db" stroke-width="1">
