<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" rx="12" fill="url(#bg)"/>

  <!-- Decorative grid dots (top-left) -->
  <g opacity="0.08" fill="#8b5cf6">
    <circle cx="40" cy="40" r="2"/><circle cx="80" cy="40" r="2"/><circle cx="120" cy="40" r="2"/><circle cx="160" cy="40" r="2"/><circle cx="200" cy="40" r="2"/><circle cx="240" cy="40" r="2"/><circle cx="280" cy="40" r="2"/><circle cx="320" cy="40" r="2"/>
    <circle cx="40" cy="80" r="2"/><circle cx="80" cy="80" r="2"/><circle cx="120" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="200" cy="80" r="2"/><circle cx="240" cy="80" r="2"/><circle cx="280" cy="80" r="2"/><circle cx="320" cy="80" r="2"/>
    <circle cx="40" cy="120" r="2"/><circle cx="80" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="160" cy="120" r="2"/><circle cx="200" cy="120" r="2"/><circle cx="240" cy="120" r="2"/><circle cx="280" cy="120" r="2"/><circle cx="320" cy="120" r="2"/>
  </g>

  <!-- Decorative grid dots (bottom-right) -->
  <g opacity="0.08" fill="#8b5cf6">
    <circle cx="880" cy="220" r="2"/><circle cx="920" cy="220" r="2"/><circle cx="960" cy="220" r="2"/><circle cx="1000" cy="220" r="2"/><circle cx="1040" cy="220" r="2"/><circle cx="1080" cy="220" r="2"/><circle cx="1120" cy="220" r="2"/><circle cx="1160" cy="220" r="2"/>
    <circle cx="880" cy="260" r="2"/><circle cx="920" cy="260" r="2"/><circle cx="960" cy="260" r="2"/><circle cx="1000" cy="260" r="2"/><circle cx="1040" cy="260" r="2"/><circle cx="1080" cy="260" r="2"/><circle cx="1120" cy="260" r="2"/><circle cx="1160" cy="260" r="2"/>
    <circle cx="880" cy="300" r="2"/><circle cx="920" cy="300" r="2"/><circle cx="960" cy="300" r="2"/><circle cx="1000" cy="300" r="2"/><circle cx="1040" cy="300" r="2"/><circle cx="1080" cy="300" r="2"/><circle cx="1120" cy="300" r="2"/><circle cx="1160" cy="300" r="2"/>
  </g>

  <!-- Accent line -->
  <rect x="80" y="100" width="60" height="4" rx="2" fill="url(#accent)" filter="url(#glow)"/>

  <!-- Main title -->
  <text x="80" y="155" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="46" font-weight="700" fill="#FEFCF9" letter-spacing="-1">
    Multi-Agent Framework
  </text>

  <!-- Subtitle -->
  <text x="80" y="195" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#a78bfa" font-weight="400">
    Hybrid coordination for Claude Code, Gemini CLI, and Codex CLI
  </text>

  <!-- Tags (outlined pills) -->
  <g transform="translate(80, 225)">
    <rect width="110" height="30" rx="15" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
    <text x="55" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#a5b4fc" text-anchor="middle">18 Agents</text>

    <rect x="125" width="100" height="30" rx="15" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <text x="175" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#c4b5fd" text-anchor="middle">12 Skills</text>

    <rect x="240" width="130" height="30" rx="15" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.6"/>
    <text x="305" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#6ee7b7" text-anchor="middle">16 Commands</text>

    <rect x="385" width="95" height="30" rx="15" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    <text x="432" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#fcd34d" text-anchor="middle">3 Hooks</text>

    <rect x="495" width="100" height="30" rx="15" fill="none" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
    <text x="545" y="20" font-family="system-ui, sans-serif" font-size="13" fill="#f9a8d4" text-anchor="middle">4 Modes</text>
  </g>

  <!-- Terminal illustration -->
  <g transform="translate(770, 45)">
    <rect width="380" height="250" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect width="380" height="32" rx="8" fill="#161b22"/>
    <rect y="24" width="380" height="8" fill="#161b22"/>
    <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="16" r="6" fill="#febc2e"/>
    <circle cx="60" cy="16" r="6" fill="#28c840"/>
    <text x="190" y="20" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">claude</text>

    <!-- Terminal content -->
    <text x="16" y="60" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#8b949e">$</text>
    <text x="30" y="60" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#a78bfa"> claude</text>
    <text x="16" y="85" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#7ee787">></text>
    <text x="30" y="85" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#c9d1d9"> /ship add authentication module</text>
    <text x="16" y="115" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e">  Phase 0: Gemini analyzing codebase...</text>
    <text x="16" y="137" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e">  Phase 1: Planning with shadow paths...</text>
    <text x="16" y="159" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#8b949e">  Phase 2: Building via wave orchestration...</text>
    <text x="16" y="181" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#7ee787">  Phase 3: 8 reviewers dispatched...</text>
    <text x="16" y="203" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#7ee787">  &#x2713; All gates passed. Shipping.</text>
    <text x="16" y="233" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#7ee787">></text>
    <text x="30" y="233" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#c9d1d9"> /status</text>

    <!-- Blinking cursor -->
    <rect x="120" y="222" width="8" height="16" fill="#a78bfa" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>